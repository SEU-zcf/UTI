extends: iscxvpn2016_ur20_enhanced.yaml

data:
  cache_dir: data/processed/iscxvpn2016_sanitized
  background_filter:
    enabled: true
    # Conservative infrastructure protocols only. Ports are used for cleaning
    # and are never exposed to the model.
    udp_ports: [53, 67, 68, 137, 138, 546, 547, 1900, 3702, 5353, 5355]
    tcp_ports: [53]
    exclude_ipv4_multicast: true
    exclude_limited_broadcast: true

train:
  output_dir: outputs/iscxvpn2016_ur20_sanitized

