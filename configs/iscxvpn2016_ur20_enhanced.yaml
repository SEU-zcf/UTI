extends: iscxvpn2016_ur20.yaml

# Enhanced UTI-MPC: preserve BGI-CNN/TWT/gating/ProtoMargin while increasing
# local-context exchange and class diversity per metric-learning batch.
model:
  bgi_residual_blocks: 1
  twt_depth: 2
  shifted_windows: true
  fusion_residual: true

train:
  output_dir: outputs/iscxvpn2016_ur20_enhanced
  # Cover all eight known classes and retain a H200-friendly 512-flow batch.
  classes_per_batch: 8
  samples_per_class: 64

